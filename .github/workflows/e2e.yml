name: E2E Tests

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-24.04
    name: Playwright E2E Tests
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Setup Weblate
      uses: ./.github/actions/setup-weblate
      with:
        python-version: '3.12'
        cache-suffix: e2e

    - name: Install Playwright browsers
      run: playwright install --with-deps chromium

    - name: Install PDF screenshot tools
      run: sudo apt-get update && sudo apt-get install --no-install-recommends --yes ghostscript

    - name: Create database
      run: ./manage.py migrate

    - name: Sync packages
      run: ./manage.py sync_packages

    - name: Run E2E tests
      env:
        DJANGO_ALLOW_ASYNC_UNSAFE: 'true'
      run: |
        pytest weblate_web/tests_e2e/ -v --screenshot=only-on-failure --video=retain-on-failure

    - name: Argos CI upload
      env:
        ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }} # zizmor: ignore[secrets-outside-env]
      run: |
        npx --package=@argos-ci/cli -- argos upload ./test-results/

    - name: Upload test artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: playwright-test-results
        path: |
          test-results/
          playwright-report/
        retention-days: 7

permissions:
  contents: read
